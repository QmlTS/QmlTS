name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (Linux x64)
    runs-on: [self-hosted, linux, x64, docker, qmlts]
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.0'
          target: desktop
          arch: linux_gcc_64
          modules: >-
            qt5compat qt3d qtcharts qtconnectivity qtgraphs qtgrpc
            qthttpserver qtimageformats qtlottie qtmultimedia
            qtnetworkauth qtpositioning qtquick3d qtquick3dphysics
            qtquicktimeline qtremoteobjects qtscxml qtsensors
            qtserialbus qtserialport qtshadertools qtspeech
            qtvirtualkeyboard qtwebchannel qtwebsockets qtwebview
            qtlocation
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files

      - name: Type check
        run: bun run typecheck

      - name: Run tests
        run: QT_DIR="$QT_ROOT_DIR" bun run test:ci
